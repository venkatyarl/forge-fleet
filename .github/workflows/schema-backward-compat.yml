name: Schema Backward Compatibility

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  schema_backward_compat:
    name: Verify serialized schemas remain deserializable
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Run schema backward compatibility tests
        # These tests assert that payloads serialized by older daemons still
        # deserialize into the current PulseBeatV2 schema, guarding rolling
        # deployments against accidental breaking changes.
        run: cargo test -p ff-pulse --lib -- legacy_beat_schema
