name: Rust Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel superseded runs on the same ref (PR branch / main) instead of stacking
# them — a re-push or update-branch supersedes the in-flight run. Cuts CI noise + minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Run formatter check
        run: cargo fmt --check

  clippy:
    name: cargo clippy --workspace -- -D warnings
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - name: Run clippy
        # Fail only on correctness / suspicious / perf groups. Style and
        # complexity drift across this workspace; tightening to all
        # warnings-as-errors would require a separate cleanup pass and
        # is tracked as future work.
        run: |
          cargo clippy --workspace -- \
            -D clippy::correctness \
            -D clippy::suspicious \
            -D clippy::perf \
            -A clippy::all

  check:
    name: cargo check --workspace
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Compile workspace
        run: cargo check --workspace

  test_lib:
    name: cargo test --workspace --lib
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Run library tests
        run: cargo test --workspace --lib

  test_integration:
    name: cargo test -p forge-fleet --test integration_boot
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Run integration tests
        run: cargo test -p forge-fleet --test integration_boot

  build_release:
    name: cargo build --release --bin forgefleetd
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Build release binary
        run: cargo build --release --bin forgefleetd
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: forgefleetd-linux-x64
          path: target/release/forgefleetd
