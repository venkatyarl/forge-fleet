# Fleet task coverage requirements.
#
# Seeded into the `fleet_task_coverage` Postgres table (schema V14).
# The CoverageGuard background loop (every 15 min on the leader) checks
# that every entry below has at least `min_models_loaded` active
# deployments whose `model_catalog.tasks` includes the task.
#
# priority:
#   - critical      → fleet is considered degraded if uncovered
#   - normal        → surfaces in `ff model coverage`, auto-loads when free
#   - nice-to-have  → tracked but never triggers an auto-load
#
# preferred_model_ids: if listed, these catalog ids jump the candidate
# ranking so the fleet converges on a known-good set.
#
# alias (schema V27): optional short handle that gateway clients can send
# as the `model` field (e.g. `"model": "coder"`) to route to any member
# of this pool. Aliases are UNIQUE across the table — one pool per alias.

[[task]]
task = "text-generation"
min_models_loaded = 1
priority = "critical"
alias = "general"

[[task]]
task = "code"
min_models_loaded = 1
priority = "critical"
alias = "coder"

[[task]]
task = "feature-extraction"
min_models_loaded = 1
priority = "normal"
preferred_model_ids = ["bge-large-en-v1.5", "qwen3-embedding-8b"]

[[task]]
task = "automatic-speech-recognition"
min_models_loaded = 1
priority = "normal"
alias = "audio"

[[task]]
task = "image-text-to-text"
min_models_loaded = 1
priority = "nice-to-have"
alias = "multimodal"

[[task]]
task = "chain-of-thought"
min_models_loaded = 1
priority = "normal"
preferred_model_ids = ["qwen3.5-35b-a3b-4bit-mlx"]
alias = "thinking"

[[task]]
task = "code-generation"
min_models_loaded = 1
priority = "normal"
preferred_model_ids = ["qwen3-coder-30b-a3b", "qwen3.6-35b-a3b"]
alias = "code"
