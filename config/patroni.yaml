scope: forge-fleet
namespace: /forge-fleet/
name: ${NODE_NAME}

restapi:
  listen: 0.0.0.0:58008
  connect_address: ${NODE_IP}:58008

etcd3:
  hosts:
    - ${TAYLOR_IP}:52379
    - ${MARCUS_IP}:52379
    - ${SOPHIE_IP}:52379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 5
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    synchronous_mode: true
    synchronous_mode_strict: true
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_connections: 500
        max_wal_senders: 10
        max_replication_slots: 10
        wal_keep_size: 256MB
        synchronous_commit: "on"
  initdb:
    - encoding: UTF8
    - data-checksums
  pg_hba:
    - host replication replicator 0.0.0.0/0 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256
  users:
    forgefleet:
      password: ${POSTGRES_PASSWORD}
      options:
        - createrole
        - createdb

postgresql:
  listen: 0.0.0.0:55432
  connect_address: ${NODE_IP}:55432
  data_dir: /var/lib/postgresql/data/pgdata
  bin_dir: /usr/lib/postgresql/16/bin
  authentication:
    superuser:
      username: postgres
      password: ${POSTGRES_PASSWORD}
    replication:
      username: replicator
      password: ${POSTGRES_REPLICATION_PASSWORD}
  parameters:
    unix_socket_directories: /var/run/postgresql
  pg_hba:
    - host replication replicator 0.0.0.0/0 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false

# LAN git mirror (crates/ff-agent/src/ha/mirror_service.rs). Disabled by
# default; set mirror_endpoint and enable per-deployment to route git
# fetches through a local mirror instead of GitHub directly.
mirror_enabled: false
mirror_endpoint: ""
mirror_update_interval: 30
