scope: forge-fleet
namespace: /forge-fleet/
name: patroni

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    etcd:
      hosts: "localhost:2379"
  postgresql:
    users:
      admin:
        password: admin
        options:
          - createrole
          - createdb
      replicator:
        password: replicator
        options:
          - replication
    parameters:
      wal_level: replica
      hot_standby: "on"
      wal_keep_segments: 8
      max_wal_senders: 10
      max_replication_slots: 10
      listen: 0.0.0.0:5432
      bind_address: 0.0.0.0

restapi:
  listen: 0.0.0.0:8008
  connect_address: localhost:8008

postgresql:
  listen: 0.0.0.0:5432
  connect_address: localhost:5432
  data_dir: /var/lib/postgresql/data/pgdata
  bin_dir: /usr/bin
  pg_hba:
    - host replication replicator all md5
    - host all all all md5
  parameters:
    wal_level: replica
    max_wal_senders: 10
    wal_keep_size: 128
    max_replication_slots: 10
    hot_standby: "on"
    synchronous_mode: "on"
    synchronous_commit: "on"
    wal_compression: "on"

tags:
  no_sync: false
  no_promote: false
  clonefrom: false
  noloadbalance: false
