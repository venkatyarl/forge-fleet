# ForgeFleet cloud LLM provider catalog.
#
# The gateway inspects incoming /v1/chat/completions requests and, when the
# `model` field matches one of these `model_prefix` values, forwards the
# request to the provider's public API instead of a local fleet node.
#
# Credentials are NOT stored here — `secret_key` is the key looked up in
# the `fleet_secrets` Postgres table. Set them with:
#     ff cloud-llm set-key <provider_id>
#
# `request_format` controls body translation:
#   openai_chat               — passthrough (OpenAI chat completions shape)
#   anthropic_messages        — translate to POST /v1/messages
#   google_generate_content   — translate to :generateContent
#
# `auth_kind = "oauth2"` is schema-ready but not wired yet; only
# `auth_kind = "api_key"` is fully functional this pass.

schema_version = "1"

[[provider]]
id = "openai"
display_name = "OpenAI (ChatGPT)"
base_url = "https://api.openai.com/v1"
auth_kind = "api_key"
secret_key = "cloud.openai.api_key"
model_prefix = "openai/"
request_format = "openai_chat"

[[provider]]
id = "anthropic"
display_name = "Anthropic (Claude)"
base_url = "https://api.anthropic.com/v1"
auth_kind = "api_key"
secret_key = "cloud.anthropic.api_key"
model_prefix = "claude-"
request_format = "anthropic_messages"

[[provider]]
id = "moonshot"
display_name = "Moonshot (Kimi)"
base_url = "https://api.moonshot.ai/v1"
auth_kind = "api_key"
secret_key = "cloud.moonshot.api_key"
model_prefix = "kimi/"
request_format = "openai_chat"

[[provider]]
id = "google"
display_name = "Google (Gemini)"
base_url = "https://generativelanguage.googleapis.com/v1beta"
auth_kind = "api_key"
secret_key = "cloud.google.api_key"
model_prefix = "gemini/"
request_format = "google_generate_content"

