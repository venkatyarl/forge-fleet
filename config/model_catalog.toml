# ForgeFleet Model Catalog
#
# Curated list of LLMs that ForgeFleet knows how to provision across the fleet.
# The `ff` CLI and the web dashboard read this file to show downloadable
# models along with their verified HuggingFace repos and size estimates.
#
# Size estimation rules of thumb:
#   Q4_K_M (gguf)  ~ 0.55 bytes / parameter
#   4bit   (mlx)   ~ 0.55 bytes / parameter
#   Q8_0   (gguf)  ~ 1.10 bytes / parameter
#   fp16           ~ 2.00 bytes / parameter
#
# Tiers:
#   1 = small     (7-9B)     runs anywhere, including 16GB nodes
#   2 = mid       (13-35B)   needs 32GB+
#   3 = large     (70-200B)  needs 64GB+ or MoE sparsity
#   4 = frontier  (200B+)    leader-node only / distributed
#
# HuggingFace Task Taxonomy (added 2026-04-18):
#   Every entry carries HF-style metadata so ForgeFleet can pick the right
#   model for the right modality/task. Fields:
#     tasks               — HF pipeline-tag values (e.g. "text-generation",
#                           "automatic-speech-recognition", "image-text-to-text")
#     input_modalities    — subset of ["text","image","audio","video"]
#     output_modalities   — subset of ["text","image","audio","video"]
#     languages           — ISO codes (optional)
#     upstream_source     — "huggingface" (default)
#     upstream_id         — canonical HF repo path
#     quality_tier        — "flagship" | "standard" | "experimental" | "legacy"
#     lifecycle_status    — "active" | "candidate" | "deprecated" | "retired"
#     required_gpu_kind   — "apple_silicon" | "nvidia_cuda" | "amd_rocm"
#                           (omit for any GPU)
#     min_vram_gb         — minimum VRAM to load
#     cpu_runnable        — whether this can run on CPU alone (slow)
#     license             — SPDX-ish short form

schema_version = "2"
updated = "2026-04-18"

# ---------------------------------------------------------------------------
# Gemma 4 — gated (Gemma terms)
# ---------------------------------------------------------------------------

[[models]]
id = "gemma4-31b-it"
name = "Gemma 4 31B Instruct"
family = "gemma"
parameters = "31B"
tier = 2
description = "Gemma 4 31B instruction-tuned. Strong general reasoning."
gated = true
preferred_workloads = ["chat", "reasoning"]
tasks = ["text-generation"]
input_modalities = ["text"]
output_modalities = ["text"]
languages = ["en"]
upstream_source = "huggingface"
upstream_id = "google/gemma-4-31b-it"
quality_tier = "flagship"
lifecycle_status = "active"
min_vram_gb = 20
cpu_runnable = false
license = "gemma"

  [[models.variants]]
  runtime = "llama.cpp"
  quant = "Q4_K_M"
  hf_repo = "bartowski/gemma-4-31b-it-GGUF"
  size_gb = 19

  [[models.variants]]
  runtime = "mlx"
  quant = "4bit"
  hf_repo = "mlx-community/gemma-4-31b-it-4bit"
  size_gb = 18

