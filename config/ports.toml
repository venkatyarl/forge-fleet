# ForgeFleet canonical port registry.
#
# Every port ForgeFleet allocates has exactly one entry here. The registry
# is the source of truth — code, docs, firewall rules, and docker-compose
# all derive from this file.
#
# Seeded into Postgres table `port_registry` on daemon startup.

schema_version = "1"
updated = "2026-04-19"

# ─── ForgeFleet core services ─────────────────────────────────────────

[[port]]
port = 51002
service = "forgefleetd"
kind = "control_plane"
description = "ForgeFleet daemon gateway API + web dashboard"
exposed_on = "all_members"
scope = "lan"
managed_by = "launchd/systemd"

[[port]]
port = 50001
service = "mcp_http"
kind = "control_plane"
description = "Model Context Protocol HTTP server"
exposed_on = "all_members"
scope = "lan"
managed_by = "forgefleetd"

[[port]]
port = 51100
service = "pulse_p2p_tcp"
kind = "coordination"
description = "Pulse peer-to-peer TCP fallback (when NATS unreachable)"
exposed_on = "all_members"
scope = "lan"
managed_by = "ff daemon"
status = "planned"

# ─── OpenClaw (agent platform) ────────────────────────────────────────

[[port]]
port = 50000
service = "openclaw_gateway"
kind = "control_plane"
description = "OpenClaw gateway WebSocket — only the elected leader serves"
exposed_on = "leader_only"
scope = "lan"
managed_by = "launchd/systemd"

# ─── LLM inference servers (dynamic port allocation) ──────────────────
#
# Convention: first model gets the base port, second gets +1, etc.
# Range 55000-55010 reserved for llama.cpp + mlx_lm.
# Ollama gets its default 11434 (multi-model via its own routing).
# vLLM conventionally uses 51001 on Linux systems.

[[port]]
port = 51001
service = "vllm"
kind = "llm_inference"
description = "vLLM (or mlx_lm on macOS) — first model on this computer"
exposed_on = "gpu_members"
scope = "lan"
managed_by = "manual or ff model load"

[[port]]
port = 51003
service = "vllm_slot_2"
kind = "llm_inference"
description = "vLLM / mlx_lm — second loaded model (51001 is first; 51002 is forgefleetd)"
exposed_on = "gpu_members"
scope = "lan"
managed_by = "manual or ff model load"

[[port]]
port = 55000
service = "llama_cpp_slot_1"
kind = "llm_inference"
description = "llama-server — first model on this computer (primary convention)"
exposed_on = "all_members_with_gguf"
scope = "lan"
managed_by = "manual or ff model load"

[[port]]
port = 55001
service = "llama_cpp_slot_2"
kind = "llm_inference"
description = "llama-server / mlx_lm.server — second loaded model"
exposed_on = "all_members_with_gguf"
scope = "lan"
managed_by = "manual or ff model load"

[[port]]
port = 55002
service = "llama_cpp_slot_3"
kind = "llm_inference"
description = "llama-server / mlx_lm.server — third loaded model"
exposed_on = "all_members_with_gguf"
scope = "lan"
managed_by = "manual or ff model load"

[[port]]
port = 11434
service = "ollama"
kind = "llm_inference"
description = "Ollama — multi-model runtime on a single port"
exposed_on = "all_members"
scope = "lan"
managed_by = "ollama systemd/launchd"

# ─── Data plane (Docker containers, Taylor hosts primary) ─────────────

[[port]]
port = 55432
service = "postgres_primary"
kind = "database"
description = "Postgres primary — exposed port 5432 mapped to host 55432"
exposed_on = "taylor"
scope = "lan"
managed_by = "docker compose"

[[port]]
port = 55433
service = "postgres_replica"
kind = "database"
description = "Postgres replica — future, host 55433 on Marcus"
exposed_on = "marcus"
scope = "lan"
managed_by = "docker compose follower"
status = "planned"

[[port]]
port = 6380
service = "redis_primary"
kind = "database"
description = "Redis primary — exposed 6379 mapped to 6380"
exposed_on = "taylor"
scope = "lan"
managed_by = "docker compose"

[[port]]
port = 6381
service = "redis_replica"
kind = "database"
description = "Redis replica — future, on Marcus"
exposed_on = "marcus"
scope = "lan"
managed_by = "docker compose follower"
status = "planned"

[[port]]
port = 26380
service = "redis_sentinel"
kind = "coordination"
description = "Redis Sentinel — DEPRECATED (Pulse v2 replaces this role)"
exposed_on = "taylor"
scope = "lan"
managed_by = "docker compose"
status = "deprecated"

[[port]]
port = 4222
service = "nats_client"
kind = "coordination"
description = "NATS client connections — pulse events, agent tasks, KV"
exposed_on = "nats_cluster_members"
scope = "lan"
managed_by = "docker compose"

[[port]]
port = 6222
service = "nats_cluster"
kind = "coordination"
description = "NATS inter-node cluster communication"
exposed_on = "nats_cluster_members"
scope = "lan"
managed_by = "docker compose"

[[port]]
port = 8222
service = "nats_monitoring"
kind = "coordination"
description = "NATS HTTP monitoring/admin"
exposed_on = "nats_cluster_members"
scope = "lan"
managed_by = "docker compose"

# ─── System / infrastructure ──────────────────────────────────────────

[[port]]
port = 22
service = "ssh"
kind = "system"
description = "SSH — key-only auth required"
exposed_on = "all_members"
scope = "lan"
managed_by = "OS sshd"

# ─── Allocation ranges (for reservation + lookup) ─────────────────────

[[range]]
start = 51001
end = 51099
purpose = "ForgeFleet control-plane services and LLM slots (even/odd split)"
reserved_for = "forgefleet"

[[range]]
start = 55000
end = 55010
purpose = "LLM inference servers (llama.cpp, mlx_lm) — sequential model slots"
reserved_for = "llm_inference"

[[range]]
start = 4222
end = 8222
purpose = "NATS cluster"
reserved_for = "nats"

# ─── Blocklist (never auto-allocate ports here) ───────────────────────

[blocklist]
well_known = "0-1023"
ephemeral = "49152-65535"
note = "LLM servers etc. must bind outside these ranges"

# ─── Per-scope firewall guidance ──────────────────────────────────────

[scope.lan]
description = "LAN-only — never expose to the public internet directly"
includes = [
    55432, 55433, 6380, 6381, 26380, 4222, 6222, 8222, 51100,
    51001, 51003, 55000, 55001, 55002, 50001, 11434,
]
note = "Use a reverse proxy / VPN if external access is required"

[scope.public_via_proxy]
description = "Accessible externally only through a reverse proxy or Tailscale"
includes = [51002, 50000]
note = "Dashboard (51002) and OpenClaw gateway (50000) exposed via proxy"
