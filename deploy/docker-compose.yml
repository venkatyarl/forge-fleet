# ForgeFleet infrastructure — all services under one project.
#
# Usage:
#   cd deploy/
#   docker compose up -d          # start everything
#   docker compose ps             # check status
#   docker compose logs -f redis  # tail redis logs
#   docker compose down           # stop everything (data persists in named volumes)
#   docker compose down -v        # stop + DELETE data volumes (destructive!)
#
# Ports exposed on the host:
#   Postgres:  55432  (connect: psql -h 192.168.5.100 -p 55432 -U forgefleet)
#   Redis:     6380   (connect: redis-cli -h 192.168.5.100 -p 6380)
#   Sentinel:  26380  (connect: redis-cli -h 192.168.5.100 -p 26380)
#   NATS:      4222   (client); 6222 (cluster); 8222 (monitoring, LAN only)

name: forgefleet

services:
  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: forgefleet-postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: forgefleet
      POSTGRES_PASSWORD: forgefleet
      POSTGRES_DB: forgefleet
      # Performance tuning for a 96GB Mac Studio (adjust per-node if needed).
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "log_min_duration_statement=1000"
      # ─── Streaming-replication knobs (Phase 6 HA) ─────────────────────
      # wal_level=replica is the minimum required by pg_basebackup + a
      # streaming standby. max_wal_senders/max_replication_slots cap the
      # number of concurrent replicas + physical slots. hot_standby=on
      # allows the standby to serve read-only queries while catching up.
      # synchronous_commit=off trades a small durability window for
      # throughput — replicas still catch up via WAL streaming and
      # periodic pg_basebackup snapshots cover the worst-case loss.
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "synchronous_commit=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgefleet -d forgefleet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - forgefleet

  # ─── Redis 7 (primary) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: forgefleet-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command:
      - "redis-server"
      - "--save"
      - "60"
      - "1"
      - "--loglevel"
      - "warning"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "2gb"
      - "--maxmemory-policy"
      - "noeviction"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - forgefleet

  # ─── Redis Sentinel (REMOVED — replaced by Pulse P2P) ─────────────────
  #
  # Per Plan 14 Phase 2/6: ff's own Pulse P2P layer (TCP on :51100, inside
  # every ff daemon) handles Redis failover via the same quorum mechanism
  # as ForgeFleet leader election. Advantages over Sentinel:
  #   • Peer discovery uses Postgres (independently replicated), not a
  #     Redis pub/sub bootstrap channel that's dead when Redis is dead.
  #   • One monitoring system for leader + Postgres + Redis + OpenClaw +
  #     LLM servers, not N separate ones.
  # See `project_ha_architecture.md` + `feedback_fleet_self_heals.md`.

  # ─── NATS JetStream (coordination + event bus + KV store) ─────────────
  nats:
    image: nats:2.10-alpine
    container_name: forgefleet-nats
    ports:
      - "4222:4222"       # client connections
      - "6222:6222"       # cluster (for future 3-node cluster on Marcus+Sophie)
      - "8222:8222"       # HTTP monitoring (LAN only)
    volumes:
      - nats_data:/data
      - ./docker/nats.conf:/etc/nats/nats.conf:ro
    command:
      - "--config"
      - "/etc/nats/nats.conf"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - forgefleet

volumes:
  postgres_data:
    name: forgefleet-postgres-data
  redis_data:
    name: forgefleet-redis-data
  # sentinel_data volume removed — see the Sentinel service block above.
  nats_data:
    name: forgefleet-nats-data

networks:
  forgefleet:
    name: forgefleet
    driver: bridge
