global
  log stdout format raw local0

defaults
  log global
  mode tcp
  timeout connect 5s
  timeout client 1m
  timeout server 1m
  timeout check 3s

frontend postgres_primary
  bind 0.0.0.0:55434
  default_backend patroni_primary

backend patroni_primary
  option httpchk GET /primary
  http-check expect status 200
  server taylor __TAYLOR_IP__:55432 check port 58008
  server marcus __MARCUS_IP__:55432 check port 58008
  server sophie __SOPHIE_IP__:55432 check port 58008

frontend postgres_replicas
  bind 0.0.0.0:55435
  default_backend patroni_replicas

backend patroni_replicas
  balance roundrobin
  option httpchk GET /replica?lag=1MB
  http-check expect status 200
  server taylor __TAYLOR_IP__:55432 check port 58008
  server marcus __MARCUS_IP__:55432 check port 58008
  server sophie __SOPHIE_IP__:55432 check port 58008
