# ForgeFleet NATS server config
# Single-node for v1; will extend to 3-node cluster in later phase.

server_name: forgefleet-nats-taylor
listen: 0.0.0.0:4222
http_port: 8222

# Clustering (prepared for future 3-node cluster)
cluster {
    name: forgefleet-cluster
    listen: 0.0.0.0:6222
    # routes: [
    #   nats-route://marcus.local:6222
    #   nats-route://sophie.local:6222
    # ]
}

# JetStream for persistent streams + KV store
jetstream {
    store_dir: /data/jetstream
    max_memory_store: 1GB
    max_file_store: 20GB
}

# Limits
max_connections: 1000
max_payload: 8MB
max_pending: 64MB

# Logging
debug: false
trace: false
logtime: true
