# ForgeFleet NATS server config
# Single-node for v1; will extend to 3-node cluster in later phase.

server_name: forgefleet-nats-taylor
listen: 0.0.0.0:4222
http_port: 8222

# JetStream for persistent streams + KV store (single-node v1)
# NOTE: the cluster block stays commented until we have 2+ peers ready.
# An orphan cluster block (no routes, no peers) makes JetStream refuse to
# start with: "JetStream cluster requires configured routes".
jetstream {
    store_dir: /data/jetstream
    max_memory_store: 1GB
    max_file_store: 20GB
}

# Clustering (UNCOMMENT when Marcus + Sophie NATS are ready — see Phase 6)
# cluster {
#     name: forgefleet-cluster
#     listen: 0.0.0.0:6222
#     routes: [
#       nats-route://marcus.local:6222
#       nats-route://sophie.local:6222
#     ]
# }

# Limits
max_connections: 1000
max_payload: 8MB
max_pending: 64MB

# Logging
debug: false
trace: false
logtime: true
