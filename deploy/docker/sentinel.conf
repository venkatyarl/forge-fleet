port 26379
dir /data

# Monitor the forgefleet Redis master.
# "forgefleet" is the master name; 127.0.0.1 6379 is the container-internal address
# of the redis service (they share the forgefleet network).
# Quorum of 1 (single-sentinel setup; increase for HA).
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
sentinel monitor forgefleet redis 6379 1

# Consider the master down after 10s of no response.
sentinel down-after-milliseconds forgefleet 10000

# Failover timeout: 30s.
sentinel failover-timeout forgefleet 30000

# How many replicas to reconfigure in parallel during failover.
sentinel parallel-syncs forgefleet 1

# Deny writes to replicas that haven't been promoted yet.
sentinel deny-scripts-reconfig yes
