<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="forgefleet-mark-title forgefleet-mark-desc">
  <title id="forgefleet-mark-title">ForgeFleet Mark</title>
